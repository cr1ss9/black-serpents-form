<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Black Serpents Form</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="brand-panel">
        <img class="logo" src="assets/black-serpents-logo.png" alt="Black Serpents logo">
        <div>
          <p class="kicker">North Side MC</p>
          <h1>BLACK SERPENTS</h1>
          <p class="live-time" id="liveTime">--</p>
        </div>
      </section>

      <section class="form-panel" aria-labelledby="formTitle">
        <div class="panel-heading">
          <p class="kicker">Δήλωση</p>
          <h2 id="formTitle">BLACK SERPENTS LOG</h2>
        </div>

        <form id="serpentsForm" autocomplete="off">
          <label>
            <span>ΟΝΟΜΑ:</span>
            <input name="name" type="text" maxlength="120" required>
          </label>

          <label>
            <span>PATCH:</span>
            <input name="patch" type="text" maxlength="120" required>
          </label>

          <label>
            <span>ΔΗΛΩΝΩ ΟΤΙ ΕΦΕΡΑ ΤΟΣΑ:</span>
            <input name="amount" type="text" maxlength="60" required>
          </label>

          <label>
            <span>ΩΡΕΣ ΣΤΗΝ ΠΟΛΗ:</span>
            <input name="cityHours" type="text" maxlength="60" required>
          </label>

          <fieldset>
            <legend>ΚΑΙ ΕΚΑΝΑ:</legend>
            <div class="activity-grid">
              <label class="check-tile"><input type="checkbox" name="activities" value="OXYPILLS"><span>OXYPILLS</span></label>
              <label class="check-tile"><input type="checkbox" name="activities" value="ΜΠΟΥΚΕΣ"><span>ΜΠΟΥΚΕΣ</span></label>
              <label class="check-tile"><input type="checkbox" name="activities" value="PAWNRUNS"><span>PAWNRUNS</span></label>
              <label class="check-tile"><input type="checkbox" name="activities" value="METAL DET"><span>METAL DET</span></label>
              <label class="check-tile"><input type="checkbox" name="activities" value="ΑΤΜ"><span>ΑΤΜ</span></label>
              <label class="check-tile"><input type="checkbox" name="activities" value="ΛΗΣΤΕΙΕΣ"><span>ΛΗΣΤΕΙΕΣ</span></label>
              <label class="check-tile"><input type="checkbox" name="activities" value="CORNERING"><span>CORNERING</span></label>
              <label class="check-tile"><input type="checkbox" name="activities" value="ΑΛΛΟ"><span>ΑΛΛΟ</span></label>
            </div>
          </fieldset>

          <label class="other-field" id="otherField">
            <span>ΑΛΛΟ:</span>
            <input name="otherText" type="text" maxlength="160">
          </label>

          <button class="primary-button" type="submit">ΑΠΟΣΤΟΛΗ ΑΙΤΗΣΗΣ</button>
          <p class="status" id="status" role="status"></p>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
